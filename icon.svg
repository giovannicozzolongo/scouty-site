<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .ring  { stroke: white; }
    .house { fill: white; }
    .handle { stroke: white; }
    @media (prefers-color-scheme: light) {
      .ring   { stroke: #3730A3; }
      .house  { fill: #3730A3; }
      .handle { stroke: #3730A3; }
    }
  </style>

  <!-- Lente: solo anello, sfondo interno trasparente -->
  <circle class="ring" cx="42" cy="42" r="28" fill="none" stroke-width="6"/>

  <!-- Casa centrata nella lente -->
  <path class="house" fill-rule="evenodd" d="M 40.5,28 Q 42,26 43.5,28 L 53.7,38.2 Q 55,39.5 55,41 L 55,51 Q 55,53 53,53 L 31,53 Q 29,53 29,51 L 29,41 Q 29,39.5 30.3,38.2 Z M 38,45 L 46,45 L 46,53 L 38,53 Z"/>

  <!-- Manico -->
  <line class="handle" x1="64" y1="64" x2="77" y2="77" fill="none" stroke-width="6" stroke-linecap="round"/>
</svg>
