<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#4F46E5"/>

  <!-- Magnifying glass body (centered slightly left-up) -->
  <circle cx="43" cy="43" r="26" fill="#3730A3" stroke="white" stroke-width="5"/>

  <!-- Miniature house inside the lens -->
  <!-- Roof triangle -->
  <polygon points="43,25 30,38 56,38" fill="white"/>
  <!-- House body -->
  <rect x="31" y="37" width="24" height="17" rx="1" fill="white"/>
  <!-- Door -->
  <rect x="40" y="45" width="6" height="9" rx="1" fill="#3730A3"/>
  <!-- Left window -->
  <rect x="33" y="39" width="5" height="5" rx="0.5" fill="#6366F1"/>
  <!-- Right window -->
  <rect x="48" y="39" width="5" height="5" rx="0.5" fill="#6366F1"/>

  <!-- Magnifying glass ring on top -->
  <circle cx="43" cy="43" r="26" fill="none" stroke="white" stroke-width="5"/>

  <!-- Handle -->
  <line x1="63" y1="63" x2="82" y2="82" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
