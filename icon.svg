<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- House-shaped magnifying glass lens (the glass IS the house silhouette) -->
  <path d="M 38,10 L 12,36 L 20,36 L 20,60 L 56,60 L 56,36 L 64,36 Z"
        fill="#3730A3" stroke="#4F46E5" stroke-width="7" stroke-linejoin="round"/>

  <!-- White door inside -->
  <rect x="33" y="44" width="10" height="16" rx="1.5" fill="white"/>

  <!-- White ring on top (magnifying glass ring effect) -->
  <path d="M 38,10 L 12,36 L 20,36 L 20,60 L 56,60 L 56,36 L 64,36 Z"
        fill="none" stroke="white" stroke-width="7" stroke-linejoin="round"/>

  <!-- Handle -->
  <line x1="59" y1="63" x2="84" y2="88" stroke="#4F46E5" stroke-width="10" stroke-linecap="round"/>
  <line x1="59" y1="63" x2="84" y2="88" stroke="white" stroke-width="6" stroke-linecap="round"/>
</svg>
