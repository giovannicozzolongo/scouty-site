  <path fill-rule="evenodd" fill="white" d="
    M 29,38 L 55,38 L 55,51.5 Q 55,53 53.5,53 L 30.5,53 Q 29,53 29,51.5 Z
    M 38,45 L 46,45 L 46,53 L 38,53 Z
  "/>

  <!-- Manico -->
  <line x1="64" y1="64" x2="77" y2="77" stroke="white" stroke-width="6" stroke-linecap="round"/>
